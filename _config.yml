title: "Sungwon Kim"
description: "Backend Engineer · Performance Engineering Portfolio"
url: "https://kosw6.github.io"
locale: "ko-KR"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap

minimal_mistakes_skin: "dark"

timezone: Asia/Seoul
markdown: kramdown
highlighter: rouge

author:
  name: "Sungwon Kim"
  avatar: "/assets/images/avatar.png"
  bio: "Backend Engineer focused on performance optimization, realtime architecture, and scalable systems."
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Kosw6"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:your-email@example.com"

collections:
  projects:
    output: true
    permalink: /projects/:name/
  reports:
    output: true
    permalink: /reports/:name/

paginate: 8
paginate_path: "/page:num/"

tag_archive:
  type: liquid
  path: /tags